name: validate

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    static-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Compile Python files
              run: |
                  python -m py_compile \
                    server.py \
                    ai_diagnose.py \
                    crawler_engine.py \
                    scrape_tiktok_comments.py \
                    scrape_youtube_comments.py \
                    scrape_multi_source_comments.py

            - name: Parse embedded JavaScript
              run: |
                  node <<'NODE'
                  const fs = require('fs');
                  for (const file of ['index.html', 'TK_AI_ECommerce_Dashboard.html']) {
                    const html = fs.readFileSync(file, 'utf8');
                    const scripts = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)]
                      .map((match) => match[1])
                      .filter((source) => !source.includes('cdn.tailwindcss.com'));
                    scripts.forEach((source) => new Function(source));
                    if (html.includes('\u00a0')) {
                      throw new Error(`${file} contains NBSP`);
                    }
                    if (html.includes('\ufffd')) {
                      throw new Error(`${file} contains replacement character`);
                    }
                    console.log(`HTML_JS_OK ${file} ${scripts.length}`);
                  }
                  NODE

            - name: Check README assets
              run: |
                  test -f README.md
                  test -f docs/assets/dashboard-preview.png
